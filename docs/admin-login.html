<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Administrativo - MIX-PROMOÇÃO</title>
  <!-- CSS externo -->
  <link rel="stylesheet" href="/css/login-admin.css">
  <link rel="stylesheet" href="/css/btn-topo.css" />
  <!-- Ícones Font Awesome -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="/css/responsive.css" />
</head>
<body class="login-bg">
  <!-- Logo da empresa no topo -->
  <header class="logo-topo">
    <div class="logo-box">
      <i class="fas fa-shopping-cart carrinho-icon"></i>
      <span class="logo-text">MIX-PROMOÇÃO</span>
    </div>
  </header>
  
  <main class="login-container">
    <h2>Login Administrador</h2>
    <!-- 🔹 Formulário com id correto -->
    <form id="formLogin">
      <label for="usuario">Usuário:</label>
      <input type="text" id="usuario" name="usuario" required>

      <label for="senha">Senha:</label>

      <div class="senha-wrapper">
        <input type="password" id="senha" name="senha" required autocomplete="current-password">
        <button type="button" id="toggleSenha" class="toggle-senha" tabindex="-1" aria-label="Mostrar ou ocultar senha">
          <i class="fa-solid fa-eye" id="iconeOlho"></i>
        </button>
      </div>

      <button type="submit" id="btnLoginAdmin" class="btn-login-admin estiloso">Entrar</button>

      <!-- GitHub login removed -->

      <p id="mensagemErro" class="erro"></p>
    </form>

    <div class="link-cadastro">
      <a href="/cadastro-admin.html" target="_blank" rel="noopener noreferrer">
        ➕ Cadastrar outro usuário
      </a>
    </div>
  </main>

  <link rel="stylesheet" href="./css/login-admin.css">
  <script src="/js/login-Admin.js" defer></script>
  <script src="/js/auth-links.js" defer></script>
  <script src="/js/btn-topo.js" defer></script>
  <script src="/js/bloquear-copia.js" defer></script>
  <script src="/js/admin-login.js" defer></script>
    <script src="/js/responsive-nav.js"></script>
  </body>
</html>
