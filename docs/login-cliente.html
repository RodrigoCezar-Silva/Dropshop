<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login do Cliente - Mix Promoção</title>
  <link rel="stylesheet" href="./css/login-cliente.css">
  <link rel="stylesheet" href="./css/btn-topo.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="./css/chatbot-widget.css" />
  <link rel="stylesheet" href="./css/responsive.css" />

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <!-- Facebook SDK -->
  <script async defer crossorigin="anonymous" src="https://connect.facebook.net/pt_BR/sdk.js"></script>
</head>
<body>
  <!-- Logo estiloso -->
  <header class="logo-topo">
    <div class="logo-box-estiloso">
      <span class="logo-icone">🛒</span>
      <span class="logo-texto">MIX <span class="logo-destaque">PROMOÇÃO</span></span>
    </div>
  </header>

  <div class="login-container">
    <!-- Status de login cliente (exibido após login) -->
    <div id="clienteStatus" style="display:none; align-items:center; gap:18px; margin-bottom: 18px;">
      <img id="fotoCliente" class="foto-perfil" src="" alt="Foto Cliente" style="width:64px;height:64px;border-radius:50%;object-fit:cover;">
      <span id="nomeCliente" class="nome-usuario"></span>
      <button id="btnMinhaConta" class="btn-minha-conta">Minha Conta</button>
      <button id="logoutBtn" class="btn-logout">Sair</button>
    </div>
    <h2>Área do Cliente</h2>
    <form id="loginForm">
      <div class="input-group">
        <label for="usuario">Email</label>
        <input type="email" id="usuario" placeholder="Digite seu email" required>
      </div>

      <div class="input-group senha-wrapper">
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="Digite sua senha" required>
        <button type="button" id="toggleSenha" class="toggle-senha" aria-label="Mostrar ou ocultar senha" title="Mostrar ou ocultar senha">
          <i class="fa-solid fa-eye"></i>
        </button>
      </div>

      <button type="submit" class="btn-login">Entrar</button>
      <!-- GitHub login removed -->
      <!-- Link para recuperação de senha estiloso -->
      <div class="esqueci-senha">
        <a href="./esqueci-senha.html">Esqueci minha senha?</a>
      </div>
      <p id="mensagemErro" class="erro"></p>
    </form>

    <!-- 🔹 Opções adicionais -->
    <div class="extra-options">
      <p>Não tem conta? 
        <a href="./cadastro-cliente-novo.html">Cadastre-se</a>
      </p>
      <p>Ou entre com:</p>
      <div class="social-login">
        <button class="btn-social facebook" id="btnFacebook" type="button">
          <i class="fa-brands fa-facebook-f"></i> Facebook
        </button>
        <button class="btn-social instagram" id="btnInstagram" type="button">
          <i class="fa-brands fa-instagram"></i> Instagram
        </button>
      </div>
      <p id="mensagemSocial" class="msg-social"></p>
    </div>
  </div>

  <script src="./js/login-cliente.js"></script>
    <script src="./js/auth-links.js"></script>
  <script src="./js/login-social.js"></script>
  <script src="./js/btn-topo.js"></script>
  <script src="./js/bloquear-copia.js"></script>
  <script src="./js/chatbot-widget.js"></script>
  <script src="./js/responsive-nav.js"></script>
</body>
</html>
