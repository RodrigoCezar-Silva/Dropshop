<!DOCTYPE html>
<html lang="pt-br">
<head>
<script id="gh-pages-base">(function(){try{var hasBase=document.querySelector('base'); if(!hasBase){var base=document.createElement('base'); var parts=location.pathname.split('/').filter(Boolean); var repoBase=parts.length?'/'+parts[0]+'/':'./'; base.setAttribute('href', repoBase); document.head.insertBefore(base, document.head.firstChild);} }catch(e){};})();</script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha</title>
    <link rel="stylesheet" href="../css/redefinir-senha.css">
    <link rel="stylesheet" href="./css/responsive.css" />
</head>
<body>
    <div class="container">
        <h2>Redefinir Senha</h2>
        <form id="redefinirSenhaForm">
            <label for="novaSenha">Nova senha:</label>
            <input type="password" id="novaSenha" name="novaSenha" required>
            <label for="repitaSenha">Repita a nova senha:</label>
            <input type="password" id="repitaSenha" name="repitaSenha" required>
            <button type="submit">Redefinir Senha</button>
        </form>
        <div id="mensagem"></div>
    </div>
    <script src="../js/redefinir-senha.js"></script>
</body>
</html>
