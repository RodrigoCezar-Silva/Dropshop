<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Cliente</title>
  <link rel="stylesheet" href="./css/cadastro-cliente-novo.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="./css/responsive.css" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="cadastro-container">
    <form class="cadastro-form-novo" autocomplete="off" novalidate>
      <div class="cadastro-header-novo">
        <div class="logo-novo">
          <!-- Avatar removido, mantendo apenas o ícone e nome da empresa -->
          <span class="nome-empresa-novo"><i class="fa fa-shopping-cart"></i> Mix Promoção</span>
        </div>
        <h1>Cadastro de Cliente</h1>
        <p>Preencha seus dados para criar sua conta</p>
            <div class="foto-circulo-wrapper">
              <input type="file" id="fotoCliente" name="fotoCliente" accept="image/*" onchange="previewFotoCirculo(event)" style="display:none;">
              <label for="fotoCliente" class="foto-circulo-label">
                <span class="foto-circulo-area">
                  <i id="iconeFotoCirculo" class="fa fa-camera"></i>
                  <img id="fotoCirculoPreview" alt="Foto do cliente" style="display:none;" />
                </span>
                <span class="foto-circulo-texto">Clique para adicionar foto</span>
              </label>
            </div>
            <!-- preview handled by external script foto-cliente-preview.js -->
      </div>
      <div class="cadastro-section-novo">
        <h2>Dados Pessoais</h2>
        <div class="campo-novo">
          <label for="nome">Nome Completo</label>
          <input type="text" id="nome" name="nome" placeholder="Seu nome completo" required>
        </div>
        <div class="campo-novo">
          <label for="cpf">CPF</label>
          <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" maxlength="14" required>
        </div>
        <div class="campo-novo">
          <label for="dataNascimento">Data de Nascimento</label>
          <input type="date" id="dataNascimento" name="dataNascimento" required>
        </div>
      </div>
      <div class="cadastro-section-novo">
        <h2>Contato</h2>
        <div class="campo-novo">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" placeholder="exemplo@email.com" required>
        </div>
        <div class="campo-novo">
          <label for="telefone">Telefone</label>
          <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000" required>
        </div>
      </div>
      <div class="cadastro-section-novo">
        <h2>Endereço</h2>
        <div class="campo-novo">
          <label for="cep">CEP</label>
          <input type="text" id="cep" name="cep" placeholder="00000-000" required>
        </div>
        <div class="campo-novo">
          <label for="rua">Rua</label>
          <input type="text" id="rua" name="rua" placeholder="Nome da rua" required>
        </div>
        <div class="campo-novo">
          <label for="numero">Número</label>
          <input type="text" id="numero" name="numero" placeholder="Número" required>
        </div>
        <div class="campo-novo">
          <label for="complemento">Complemento</label>
          <input type="text" id="complemento" name="complemento" placeholder="Apartamento, bloco, etc.">
        </div>
        <div class="campo-novo">
          <label for="bairro">Bairro</label>
          <input type="text" id="bairro" name="bairro" placeholder="Bairro" required>
        </div>
        <div class="campo-novo">
          <label for="cidade">Cidade</label>
          <input type="text" id="cidade" name="cidade" placeholder="Cidade" required>
        </div>
        <div class="campo-novo">
          <label for="estado">Estado</label>
          <input type="text" id="estado" name="estado" placeholder="Estado" required>
        </div>
      </div>

      <div class="cadastro-section-novo">
        <h2>Senha de Acesso</h2>
        <div class="campo-novo">
          <label for="senha">Senha</label>
          <div style="position:relative;display:flex;align-items:center;">
            <input type="password" id="senha" name="senha" placeholder="Crie uma senha para login" required minlength="6" autocomplete="new-password" style="width:100%;">
            <i id="toggleSenha" class="fa fa-eye" style="position:absolute;right:12px;cursor:pointer;color:#4f8cff;font-size:1.2em;"></i>
          </div>
          <div class="medidor-senha-wrapper" style="margin-top:8px;">
            <div id="medidorSenhaBarra" style="height:7px;width:0;background:#e74c3c;border-radius:6px;transition:all 0.2s;"></div>
            <span id="medidorSenhaTexto" style="font-size:0.98em;font-weight:600;margin-left:8px;"></span>
          </div>
        </div>
        <div class="campo-novo">
          <label for="confirmaSenha">Confirmar Senha</label>
          <div style="position:relative;display:flex;align-items:center;">
            <input type="password" id="confirmaSenha" name="confirmaSenha" placeholder="Repita a senha" required minlength="6" autocomplete="new-password" style="width:100%;">
            <i id="toggleConfirmarSenha" class="fa fa-eye" style="position:absolute;right:12px;cursor:pointer;color:#4f8cff;font-size:1.2em;"></i>
          </div>
        </div>
        <div id="mensagemSenha" style="margin-top:6px;font-size:0.98em;font-weight:600;"></div>
      </div>
      <button class="btn-cadastrar-novo" type="submit">Cadastrar</button>
    </form>
  </div>
</body>
  <script src="./js/foto-cliente-preview.js"></script>
  <script src="./js/cadastro-cliente.js"></script>
</html>
