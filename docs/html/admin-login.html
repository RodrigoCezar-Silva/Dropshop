<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Administrativo - MIX-PROMOÇÃO</title>
  <!-- CSS externo -->
  <link rel="stylesheet" href="./css/login-admin.css">
  <link rel="stylesheet" href="./css/btn-topo.css" />
  <!-- Ícones Font Awesome -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="./css/responsive.css" />
</head>
<body class="login-bg">
  <!-- Logo da empresa no topo -->
  <header class="logo-topo">
    <div class="logo-box">
      <i class="fas fa-shopping-cart carrinho-icon"></i>
      <span class="logo-text">MIX-PROMOÇÃO</span>
    </div>
  </header>
  
  <main class="login-container">
    <h2>Login Administrador</h2>
    <!-- 🔹 Formulário com id correto -->
    <form id="formLogin">
      <label for="usuario">Usuário:</label>
      <input type="text" id="usuario" name="usuario" required>

      <label for="senha">Senha:</label>

      <div class="senha-wrapper">
        <input type="password" id="senha" name="senha" required autocomplete="current-password">
        <button type="button" id="toggleSenha" class="toggle-senha" tabindex="-1" aria-label="Mostrar ou ocultar senha">
          <i class="fa-solid fa-eye" id="iconeOlho"></i>
        </button>
      </div>

      <button type="submit" id="btnLoginAdmin" class="btn-login-admin estiloso">Entrar</button>

      <a id="githubLoginAdmin" class="btn-github" href="#" style="display:inline-block;margin-top:12px;">Entrar com GitHub</a>

      <p id="mensagemErro" class="erro"></p>
    </form>

    <div class="link-cadastro">
      <a href="http://127.0.0.1:5501/html/cadastro-admin.html" target="_blank" rel="noopener noreferrer">
        ➕ Cadastrar outro usuário
      </a>
    </div>
  </main>

  <style>
    body.login-bg {
      min-height: 100vh;
      background: linear-gradient(270deg, #21cbf3, #2196f3, #ff9800, #ffb347, #21cbf3);
      background-size: 200% 200%;
      animation: gradienteAnimado 8s ease-in-out infinite;
    }
    @keyframes gradienteAnimado {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .senha-wrapper {
      position: relative;
      background: #fff;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      margin-bottom: 18px;
      margin-top: 0;
      transition: box-shadow 0.2s, border-color 0.2s;
      height: 48px;
      display: flex;
      align-items: center;
    }
    .senha-wrapper.focado {
      border: 2px solid #2196f3;
      box-shadow: 0 0 0 2px #2196f3;
    }
    .senha-wrapper input[type="password"] {
      flex: 1;
      height: 100%;
      padding: 0 44px 0 12px;
      border: none;
      background: transparent;
      font-size: 1.1em;
      border-radius: 8px;
      outline: none;
      color: #222;
      box-shadow: none;
      box-sizing: border-box;
      margin: 0;
      line-height: 1.2;
      display: block;
    }
    .senha-wrapper input[type="password"]:focus {
      outline: none;
      box-shadow: none;
    }
    .login-container input[type="text"] {
      background: #fff;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      padding: 0 12px;
      font-size: 1.1em;
      margin-bottom: 18px;
      outline: none;
      color: #222;
      width: 100%;
      transition: box-shadow 0.2s;
      margin-top: 0;
      height: 48px;
      box-sizing: border-box;
      line-height: 1.2;
      display: block;
    }
    .login-container input[type="text"]:focus {
      box-shadow: 0 0 0 2px #2196f3;
    }
    .toggle-senha {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0 6px;
      color: #2196f3;
      font-size: 1.35em;
      outline: none;
      z-index: 2;
      transition: color 0.2s, background 0.2s;
      background: transparent;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .toggle-senha:focus {
      outline: none;
      background: rgba(33,203,243,0.08);
      border-radius: 50%;
    }
    .toggle-senha:hover {
      color: #ff9800;
      background: rgba(255,152,0,0.08);
      border-radius: 50%;
    }
    .btn-login-admin.estiloso {
      width: 100%;
      margin-top: 10px;
      background: linear-gradient(90deg, #2196f3 0%, #21cbf3 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 0;
      font-size: 1.15em;
      font-weight: bold;
      letter-spacing: 1px;
      box-shadow: 0 2px 8px rgba(33,203,243,0.08);
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .btn-login-admin.estiloso:hover {
      background: linear-gradient(90deg, #21cbf3 0%, #2196f3 100%);
      box-shadow: 0 4px 16px rgba(33,203,243,0.18);
    }
    .login-container label {
      font-weight: 600;
      margin-bottom: 4px;
      display: block;
      color: #222;
    }
    .login-container input[type="text"] {
      background: #fff;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      padding: 12px;
      font-size: 1.1em;
      margin-bottom: 18px;
      outline: none;
      color: #222;
      width: 100%;
      transition: box-shadow 0.2s;
    }
    .login-container input[type="text"]:focus {
      box-shadow: 0 0 0 2px #2196f3;
    }
  </style>
  <script src="./js/login-Admin.js" defer></script>
  <script src="./js/auth-links.js" defer></script>
  <script src="./js/btn-topo.js" defer></script>
  <script src="./js/bloquear-copia.js" defer></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const senhaInput = document.getElementById('senha');
      const toggleSenha = document.getElementById('toggleSenha');
      const iconeOlho = document.getElementById('iconeOlho');
      const senhaWrapper = document.querySelector('.senha-wrapper');
      if (senhaInput && senhaWrapper) {
        senhaInput.addEventListener('focus', function() {
          senhaWrapper.classList.add('focado');
        });
        senhaInput.addEventListener('blur', function() {
          senhaWrapper.classList.remove('focado');
        });
      }
      if (toggleSenha && senhaInput && iconeOlho) {
        toggleSenha.addEventListener('click', function() {
          if (senhaInput.type === 'password') {
            senhaInput.type = 'text';
            iconeOlho.classList.remove('fa-eye');
            iconeOlho.classList.add('fa-eye-slash');
          } else {
            senhaInput.type = 'password';
            iconeOlho.classList.remove('fa-eye-slash');
            iconeOlho.classList.add('fa-eye');
          }
        });
      }
    });
  </script>
    <script src="./js/responsive-nav.js"></script>
  </body>
</html>
