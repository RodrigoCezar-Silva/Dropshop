<!doctype html>
<html lang="pt-BR">
<head>
<script id="gh-pages-base">(function(){try{var hasBase=document.querySelector('base'); if(!hasBase){var base=document.createElement('base'); var parts=location.pathname.split('/').filter(Boolean); var repoBase=parts.length?'/'+parts[0]+'/':'./'; base.setAttribute('href', repoBase); document.head.insertBefore(base, document.head.firstChild);} }catch(e){};})();</script>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Autenticação</title>
</head>
<body>
  <p>Autenticando...</p>
  <script>
    (function(){
      function qs(){
        const q = {};
        location.search.replace(/^\?/, '').split('&').forEach(function(part){
          if(!part) return; const kv = part.split('='); q[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1]||'');
        });
        return q;
      }
      const p = qs();
      if (p.token) {
        localStorage.setItem('token', p.token);
        localStorage.setItem('tipoUsuario', p.tipoUsuario || 'Administrador');
        if (p.nome) localStorage.setItem('nome', p.nome);
        if (p.sobrenome) localStorage.setItem('sobrenome', p.sobrenome);
        // redirect to admin area
        setTimeout(()=> location.href = './html/admin-area.html', 500);
      } else {
        document.body.innerHTML = '<p>Erro na autenticação via GitHub.</p>';
      }
    })();
  </script>
</body>
</html>
