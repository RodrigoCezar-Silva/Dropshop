name: Deploy docs to GitHub Pages

on:
  push:
    branches:
      - main

# Ensure the workflow token has permission to push files
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare docs directory (copy docs/html -> docs if needed)
        run: |
          echo "Listing docs before copy"
          ls -la docs || true
          if [ -d docs/html ]; then
            echo "Found docs/html, copying contents to docs/"
            cp -r docs/html/* docs/ || true
          else
            echo "docs/html not found, skipping copy"
          fi
          echo "Listing docs after copy"
          ls -la docs || true

      - name: Deploy `docs/` to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
