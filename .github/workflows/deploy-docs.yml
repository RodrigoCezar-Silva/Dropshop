name: Deploy docs to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare `docs` for Pages
        run: |
          echo "Debug: listando docs before copy"
          ls -la docs || true
          if [ -f docs/html/index.html ]; then
            echo "docs/html/index.html detected — copying docs/html/* -> docs/"
            cp -r docs/html/* docs/ || true
          else
            echo "docs/html/index.html not found — leaving docs/ as-is"
          fi
          echo "After copy:"
          ls -la docs || true

      - name: Upload `docs` folder to pages artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy `docs/` to gh-pages (peaceiris)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          destination_branch: gh-pages
