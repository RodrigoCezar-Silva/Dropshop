name: Node.js CI and Publish on Release

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://npm.pkg.github.com'

      - name: Install dependencies
        run: npm ci

      - name: Run tests if defined
        run: |
          set -e
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.test && !p.scripts.test.includes('Error: no test specified') ? 0:1)"; then
            echo 'Running tests...'
            npm test
          else
            echo 'No test script defined or default placeholder found — skipping tests.'
          fi

      - name: Publish to GitHub Packages if package is scoped
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          if node -e "const p=require('./package.json'); process.exit(p.name && p.name.startsWith('@') ? 0:1)"; then
            echo 'Package appears scoped — publishing to GitHub Packages...'
            npm publish --registry https://npm.pkg.github.com
          else
            echo 'Package name is not scoped (does not start with @owner). Skipping publish to GitHub Packages.'
          fi
