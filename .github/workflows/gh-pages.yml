name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]

# Permissions required so the workflow can publish to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # força actions JavaScript a rodar em Node.js 24 agora (aviso depreciação)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          # permitir que o workflow faça push (necessário para actions-gh-pages)
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Environment and repo diagnostics
        run: |
          echo "Runner: $(uname -a)"
          node -v || true
          npm -v || true
          echo '--- git status ---'
          git status --porcelain || true
          echo '--- repo files (root) ---'
          ls -la || true
          echo '--- package.json ---'
          cat package.json || true
          echo '--- check for LFS pointers ---'
          git grep -n "git-lfs.github.com/spec/v1" || true

      - name: Install dependencies (safe)
        run: |
          # prefer `npm ci` when lockfile exists, otherwise fallback to `npm install`
          if [ -f package-lock.json ]; then
            echo 'Using npm ci'
            npm ci
          else
            echo 'No package-lock.json, using npm install'
            npm install
          fi

      - name: Build docs folder
        run: npm run build:docs

      - name: Build docs diagnostics
        run: |
          echo '--- docs contents ---'
          ls -la docs || true
          echo '--- docs tree ---'
          find docs -maxdepth 3 -type f | sed -n '1,200p' || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          publish_dir: ./docs
          destination_dir: /
          publish_branch: gh-pages
          github_token: ${{ secrets.GITHUB_TOKEN }}
