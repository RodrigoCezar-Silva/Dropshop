<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Autenticação</title>
</head>
<body>
  <p>Autenticando...</p>
  <script>
    (function(){
      function qs(){
        const q = {};
        location.search.replace(/^\?/, '').split('&').forEach(function(part){
          if(!part) return; const kv = part.split('='); q[decodeURIComponent(kv[0])] = decodeURIComponent(kv[1]||'');
        });
        return q;
      }
      const p = qs();
      if (p.token) {
        localStorage.setItem('token', p.token);
        const tipo = (p.tipoUsuario || 'Administrador');
        localStorage.setItem('tipoUsuario', tipo);
        if (p.nome) localStorage.setItem('nome', p.nome);
        if (p.sobrenome) localStorage.setItem('sobrenome', p.sobrenome);

        // Redirect based on user type
        setTimeout(()=>{
          if (tipo.toLowerCase().startsWith('cliente')) {
            location.href = '/html/meu-perfil.html';
          } else if (tipo.toLowerCase().startsWith('admin')) {
            location.href = '/html/admin-area.html';
          } else {
            location.href = '/html/index.html';
          }
        }, 500);
      } else {
        document.body.innerHTML = '<p>Erro na autenticação via GitHub.</p>';
      }
    })();
  </script>
</body>
</html>
